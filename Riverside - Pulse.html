<style>
  html, body { margin: 0; height: 100%; background: var(--neutral-50); }
  #root { min-height: 100%; }
  @keyframes rp-pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: .4; transform: scale(.78); } }
  @keyframes rp-toast-in { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes p-in { from { transform: translateY(14px); } to { transform: translateY(0); } }
  @keyframes rp-blink { 0%, 100% { opacity: .25; } 50% { opacity: 1; } }
  @keyframes rp-fade { from { opacity: 0; } to { opacity: 1; } }
  .p-card { animation: p-in .42s var(--ease-out); }
  .rp-livedot { animation: rp-pulse 1.6s ease-in-out infinite; }
  ::-webkit-scrollbar { width: 10px; } ::-webkit-scrollbar-thumb { background: var(--neutral-300); border-radius: 6px; }
</style>
